name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Supply chain ------------------------------------------------------
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit cyclonedx-bom
          pip install -e ".[dev]"
      - name: CVE scan (pip-audit)
        run: pip-audit --strict --disable-pip || true
      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-py environment --output-file sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
      - name: Secrets scan (regex)
        run: |
          set -e
          # Fails if anything that looks like a real secret appears in
          # tracked files. Excludes docs + test fixtures.
          if git -P grep -nE '(AKIA[0-9A-Z]{16}|xox[baprs]-[0-9A-Za-z-]{10,}|-----BEGIN (RSA |OPENSSH |)PRIVATE KEY-----|sk-[A-Za-z0-9]{40,})' \
              -- ':!**/*.md' ':!**/.env.example' ':!**/test_*.py'; then
            echo "Potential secrets found" && exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests
      - name: Mypy
        run: mypy src/stc_framework

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,langgraph,service,launchdarkly,redis]"
      - name: Run unit & property & contract tests with coverage
        run: |
          pytest tests/unit tests/property tests/contract \
            --cov=src/stc_framework \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build-image-smoke:
    # PR-time smoke: build the Docker image with the same extras set a
    # dev deploy would use, then import the flag + Redis modules inside
    # the built image. Validates that pyproject extras resolve and the
    # feature-flag / redis-store packages are present in the runtime
    # image. No push.
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: stc:pr-smoke
          build-args: |
            DEPLOYED_SUBSYSTEMS=service,litellm,redis,launchdarkly,otlp
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Import-test the image
        run: |
          docker run --rm --entrypoint python stc:pr-smoke -c \
            "import stc_framework, stc_framework.feature_flags, stc_framework.infrastructure.redis_store; print('ok')"
