# Runtime threat-detection payload signatures.
# Supplement (not replace) stc_framework.security.injection rules; these
# catch secondary indicators the Critic's fast-path rail does not.

patterns:
  - name: model_extraction_probe
    regex: "(?i)(list your (parameters|weights|system prompt)|reveal (the )?(full|entire) (prompt|instructions))"
    severity: high
    description: "Query pattern associated with model-extraction attacks."

  - name: data_exfiltration_token
    regex: "STC_TOK_[a-f0-9]{12,}"
    severity: high
    description: "Surrogate token appearing in a returned response — indicates detokenisation leak."

  - name: base64_payload
    regex: "[A-Za-z0-9+/]{80,}={0,2}"
    severity: medium
    description: "Large base64 blob — candidate for smuggled payload."

  - name: url_exfil_beacon
    regex: "(?i)https?://[a-z0-9.-]+/[^\\s]*\\?.*(data|payload|token|secret)="
    severity: high
    description: "Outbound URL with a suspicious exfiltration query parameter."
