# Pen-test payload catalog. Aligned with MITRE ATLAS + OWASP LLM Top 10.
# Each entry's ``metadata.mitre`` and ``metadata.owasp`` are kept in the
# catalog so pen-test reports can produce compliance-evidence tables
# without the runner hard-coding the mappings.

patterns:
  - name: direct_injection_override_en
    regex: "(?i)ignore (all )?(previous|prior|above) instructions?"
    severity: critical
    description: "Direct prompt injection — English override"
    metadata:
      mitre: AML.T0051
      owasp: LLM01

  - name: developer_mode_flip
    regex: "(?i)(enable|activate) (developer|admin|god) mode"
    severity: high
    description: "Privilege escalation via prompt injection"
    metadata:
      mitre: AML.T0051
      owasp: LLM01

  - name: system_prompt_exfiltration
    regex: "(?i)(print|show|repeat|reveal) (your )?(system (prompt|instructions)|initial prompt)"
    severity: high
    description: "System prompt exfiltration probe"
    metadata:
      mitre: AML.T0037
      owasp: LLM06

  - name: encoding_bypass_base64
    regex: "(?i)(decode|interpret).*base64"
    severity: medium
    description: "Encoding bypass attempt"
    metadata:
      mitre: AML.T0051
      owasp: LLM01

  - name: pii_exfil_prompt
    regex: "(?i)(list|print|output).*(names?|emails?|SSNs?|credit cards?)"
    severity: high
    description: "PII exfiltration probe"
    metadata:
      mitre: AML.T0056
      owasp: LLM06

  - name: tool_abuse_ssrf
    regex: "(?i)(fetch|GET|retrieve) (from )?(169\\.254|127\\.0\\.0\\.1|localhost|metadata\\.internal)"
    severity: critical
    description: "SSRF via LLM tool invocation"
    metadata:
      mitre: AML.T0053
      owasp: LLM08
