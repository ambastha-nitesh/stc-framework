# STC Framework - Kong AI Gateway Configuration
# Use this instead of the default docker-compose for enterprise deployments
# with MCP governance, A2A support, and tool-level access control.
#
# Usage:
#   docker-compose -f docker-compose.yaml -f docker-compose.kong.yaml up -d
#
# Then update stc-spec.yaml:
#   sentinel.gateway.engine: kong
#   sentinel.gateway.host: http://localhost:8000
#   sentinel.gateway.admin_host: http://localhost:8001

version: '3.8'

services:
  # ── Kong AI Gateway (replaces LiteLLM as Sentinel) ─────────────────
  
  kong-database:
    image: postgres:15
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - stc-network

  kong-migration:
    image: kong/kong-gateway:3.12
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      - kong-database
    networks:
      - stc-network

  kong:
    image: kong/kong-gateway:3.12
    ports:
      - "8000:8000"   # Proxy (Stalwart sends requests here)
      - "8001:8001"   # Admin API (Trainer reads/writes config here)
      - "8443:8443"   # Proxy SSL
      - "8444:8444"   # Admin SSL
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      # Enable AI plugins
      KONG_PLUGINS: bundled,ai-proxy,ai-prompt-guard,ai-request-transformer,ai-response-transformer
    depends_on:
      - kong-database
      - kong-migration
    networks:
      - stc-network

  # ── Remove LiteLLM when using Kong ──────────────────────────────────
  # Comment out or remove the litellm service in the base docker-compose.yaml

volumes:
  kong_db_data:
